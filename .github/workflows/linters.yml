name: Linters

on:
  push:
    branches-ignore: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate code base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run style lint
        run: npm run lint:styles

      - name: Run lint
        run: npm run lint

      - name: Run type verification
        run: npm run verify

      - name: Run tests
        run: npm test
