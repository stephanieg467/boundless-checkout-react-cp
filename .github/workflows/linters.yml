name: Linters

on:
  push:
    branches-ignore: [master]
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate code base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run style lint
        run: npm run lint:styles

      - name: Run lint
        run: npm run lint

      - name: Run type verification
        run: npm run verify

      - name: Run tests with coverage
        run: npm test -- --coverage

      - name: Run Fallow quality gate
        env:
          FALLOW_BASE: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || 'origin/master' }}
        run: |
          git diff --unified=0 "$FALLOW_BASE"...HEAD > /tmp/fallow.diff
          npm run fallow:audit:ci -- \
            --base "$FALLOW_BASE" \
            --diff-file /tmp/fallow.diff \
            --coverage coverage/coverage-final.json
