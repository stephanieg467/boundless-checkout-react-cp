name: Linters

on:
  pull_request:
    branches: [master]

jobs:
  validate:
    name: Validate code base
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run style lint
        run: npm run lint:styles

      - name: Run lint
        run: npm run lint

      - name: Run type verification
        run: npm run verify

      - name: Run Fallow quality gate
        uses: fallow-rs/fallow@v2
        with:
          command: audit
          changed-since: origin/master
          gate: new-only
          fail-on-issues: true
          annotations: true

      - name: Run tests
        run: npm test
